apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-app-deployment
  labels:
    app: cloudops-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-web
  template:
    metadata:
      labels:
        app: cloudops-web
    spec:
      containers:
      - name: production-app-container
        image: REPLACE_WITH_ACR_NAME.azurecr.io/coudops-app:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-lb-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: cloudops-web
